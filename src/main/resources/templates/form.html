<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data - Sistem Informasi Mahasiswa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
        }
        .navbar {
            background: #4a90d9;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            font-size: 18px;
        }
        .navbar-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            margin-left: 12px;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 4px;
        }
        .navbar-links a:hover {
            background: rgba(255,255,255,0.3);
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 30px;
        }
        .card h2 {
            margin-bottom: 6px;
            color: #333;
            font-size: 20px;
        }
        .card .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 4px;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #555;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        .btn-submit {
            padding: 10px 24px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background: #357abd;
        }
        .btn-reset {
            padding: 10px 24px;
            background: #eee;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-reset:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Sistem Informasi Mahasiswa</h1>
        <div class="navbar-links">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/logout}">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Input Data Mahasiswa</h2>
            <p class="subtitle">Isi form berikut untuk menambahkan data mahasiswa baru</p>

            <form th:action="@{/form}" method="post">
                <div class="form-group">
                    <label for="nama">Nama</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" name="nim" placeholder="Masukkan NIM" required>
                </div>
                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="jenisKelamin" value="Laki-laki" required>
                            Laki-laki
                        </label>
                        <label>
                            <input type="radio" name="jenisKelamin" value="Perempuan">
                            Perempuan
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">Submit</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
